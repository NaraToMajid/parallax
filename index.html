<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Tracking 3D Parallax + Preview Kamera</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 30;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #status {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 24px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 30;
            font-size: 16px;
            font-weight: 400;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }
        #status.error {
            background: rgba(220, 50, 50, 0.8);
        }
        #status.warning {
            background: rgba(255, 165, 0, 0.8);
        }
        /* Container untuk video preview dan canvas deteksi */
        #camera-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 220px;
            height: 165px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 40;
            backdrop-filter: blur(4px);
            background: rgba(0,0,0,0.2);
            resize: both;
            opacity: 0.95;
            transition: opacity 0.2s;
            cursor: move;
            touch-action: none; /* untuk drag */
        }
        #camera-container:hover {
            opacity: 1;
            border-color: #00ffff;
        }
        #camera-video, #camera-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        #camera-canvas {
            z-index: 2;
            pointer-events: none; /* biar bisa klik tombol di belakang */
        }
        #camera-label {
            position: absolute;
            bottom: 5px;
            left: 8px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            backdrop-filter: blur(2px);
            z-index: 3;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 10;
        }
        canvas {
            display: block;
        }
        /* Drag handle */
        #drag-handle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            cursor: move;
            z-index: 5;
        }
        @media (max-width: 600px) {
            #camera-container {
                width: 160px;
                height: 120px;
                bottom: 10px;
                right: 10px;
            }
            #info { font-size: 12px; padding: 8px 16px; }
            #status { font-size: 14px; padding: 8px 20px; white-space: normal; width: 70%; }
        }
    </style>
</head>
<body>
    <div id="info">👤 FACE TRACKING 3D · PREVIEW KAMERA</div>
    <div id="status">📡 Menginisialisasi...</div>
    <div id="camera-container" class="draggable">
        <div id="drag-handle"></div>
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="camera-canvas"></canvas>
        <div id="camera-label">📷 FACE DETECTION</div>
    </div>
    <div id="overlay"></div>

    <!-- Memuat library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        (function() {
            // --- Inisialisasi Three.js Scene ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
        
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // --- Elemen 3D ---
            const worldGroup = new THREE.Group();
            scene.add(worldGroup);
            
            // Kubus latar belakang (layer jauh)
            const cubeGroupFar = new THREE.Group();
            const colors = [0x4facfe, 0x00f2fe, 0xa18cd1, 0xfbc2eb, 0x43e97b, 0x38f9d7, 0xff9a9e, 0xfad0c4];
            for (let i = 0; i < 40; i++) {
                const size = Math.random() * 0.8 + 0.2;
                const geometry = new THREE.BoxGeometry(size, size, size);
                const material = new THREE.MeshStandardMaterial({ 
                    color: colors[Math.floor(Math.random() * colors.length)],
                    emissive: 0x111111,
                    roughness: 0.4,
                    metalness: 0.1,
                    transparent: true,
                    opacity: 0.6
                });
                const cube = new THREE.Mesh(geometry, material);
                const radius = 14;
                cube.position.x = (Math.random() - 0.5) * radius * 2;
                cube.position.y = (Math.random() - 0.5) * radius * 1.5;
                cube.position.z = (Math.random() - 0.5) * radius * 0.8 - 6;
                cube.rotation.x = Math.random() * Math.PI;
                cube.rotation.y = Math.random() * Math.PI;
                cubeGroupFar.add(cube);
            }
            worldGroup.add(cubeGroupFar);
            
            // Objek utama: Wajah 3D (layer tengah)
            const faceGroup = new THREE.Group();
            
            // Lingkaran cahaya
            const ringGeo = new THREE.TorusGeometry(2.2, 0.08, 16, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x004466 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.rotation.z = Math.PI / 4;
            faceGroup.add(ring);
            
            const ring2Geo = new THREE.TorusGeometry(1.8, 0.05, 16, 100);
            const ring2Mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
            const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
            ring2.rotation.x = Math.PI / 2;
            ring2.rotation.z = -Math.PI / 6;
            faceGroup.add(ring2);
            
            // Kepala
            const headGeo = new THREE.SphereGeometry(1.5, 32, 32);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x221100, roughness: 0.4 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.2;
            faceGroup.add(head);
            
            // Mata
            const eyeGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.7, 0.7, 1.2);
            faceGroup.add(eyeL);
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.7, 0.7, 1.5);
            faceGroup.add(pupilL);
            
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.7, 0.7, 1.2);
            faceGroup.add(eyeR);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.7, 0.7, 1.5);
            faceGroup.add(pupilR);
            
            // Hidung
            const noseGeo = new THREE.ConeGeometry(0.3, 0.8, 8);
            const noseMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.set(0, -0.2, 1.6);
            nose.rotation.x = 0.2;
            faceGroup.add(nose);
            
            // Mulut
            const mouthGeo = new THREE.TorusGeometry(0.5, 0.1, 8, 32, Math.PI);
            const mouthMat = new THREE.MeshStandardMaterial({ color: 0xff6699 });
            const mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.7, 1.4);
            mouth.rotation.x = 0.1;
            mouth.rotation.z = 0.1;
            mouth.scale.set(0.8, 0.5, 0.5);
            faceGroup.add(mouth);
            
            worldGroup.add(faceGroup);
            
            // Partikel (layer depan)
            const particleCount = 800;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            const particleColors = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                const r = 8 + Math.random() * 18;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi) - 3;
                particlePositions[i*3] = x;
                particlePositions[i*3+1] = y;
                particlePositions[i*3+2] = z;
                const color = new THREE.Color().setHSL(Math.random() * 0.2 + 0.5, 0.9, 0.6);
                particleColors[i*3] = color.r;
                particleColors[i*3+1] = color.g;
                particleColors[i*3+2] = color.b;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
            const particleMat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particleGeo, particleMat);
            worldGroup.add(particles);
            
            // Lampu
            scene.add(new THREE.AmbientLight(0x404060));
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(1, 1, 5);
            scene.add(mainLight);
            scene.add(new THREE.PointLight(0x4466ff, 1, 20).set(5, 2, 5));
            scene.add(new THREE.PointLight(0xff6644, 1, 20).set(-5, -1, 5));
            scene.add(new THREE.PointLight(0x44ff88, 0.6, 30).set(0, 5, 10));
            
            // --- Variabel Face Tracking ---
            let videoElement = document.getElementById('camera-video');
            const canvasDetect = document.getElementById('camera-canvas');
            const ctx = canvasDetect.getContext('2d');
            const statusEl = document.getElementById('status');
            
            let faceDetected = false;
            let modelLoaded = false;
            let detectionActive = true;
            
            // Target rotasi dan smoothing
            const targetRotation = { x: 0, y: 0 };
            const currentRotation = { x: 0, y: 0 };
            const smoothFactor = 0.15; // lebih responsif
            
            // Skalator rotasi (maksimum radian)
            const MAX_ROT_Y = 0.7; // 40 derajat
            const MAX_ROT_X = 0.4; // 23 derajat
            
            // Untuk fallback mouse
            let mouseX = 0, mouseY = 0;
            
            // --- Setup Kamera ---
            async function setupCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user', width: 640, height: 480 } 
                    });
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    
                    // Set canvas size sesuai video
                    canvasDetect.width = videoElement.videoWidth || 640;
                    canvasDetect.height = videoElement.videoHeight || 480;
                    
                    statusEl.innerText = '📷 Kamera aktif, memuat model...';
                    return videoElement;
                } catch (err) {
                    statusEl.innerText = '❌ Kamera tidak dapat diakses. Gunakan mouse.';
                    statusEl.classList.add('error');
                    throw err;
                }
            }
            
            // --- Load Model FaceAPI ---
            async function loadModels() {
                try {
                    statusEl.innerText = '⏳ Memuat model deteksi wajah...';
                    await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                    await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                    modelLoaded = true;
                    statusEl.innerText = '✅ Model siap. Deteksi wajah dimulai.';
                } catch (err) {
                    statusEl.innerText = '⚠️ Model gagal dimuat, gunakan mouse.';
                    statusEl.classList.add('warning');
                    modelLoaded = false;
                }
            }
            
            // --- Fungsi deteksi wajah dan gambar overlay ---
            async function detectAndDraw() {
                if (!detectionActive || !videoElement || videoElement.readyState < 2) {
                    requestAnimationFrame(detectAndDraw);
                    return;
                }
                
                // Pastikan ukuran canvas sesuai video
                if (canvasDetect.width !== videoElement.videoWidth || canvasDetect.height !== videoElement.videoHeight) {
                    canvasDetect.width = videoElement.videoWidth;
                    canvasDetect.height = videoElement.videoHeight;
                }
                
                // Gambar video ke canvas
                ctx.clearRect(0, 0, canvasDetect.width, canvasDetect.height);
                ctx.drawImage(videoElement, 0, 0, canvasDetect.width, canvasDetect.height);
                
                let detected = false;
                
                if (modelLoaded) {
                    try {
                        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
                        const detections = await faceapi.detectSingleFace(videoElement, options).withFaceLandmarks();
                        
                        if (detections) {
                            detected = true;
                            const box = detections.detection.box;
                            const landmarks = detections.landmarks;
                            
                            // Gambar kotak wajah
                            ctx.strokeStyle = '#00ffff';
                            ctx.lineWidth = 3;
                            ctx.shadowColor = '#00ffff';
                            ctx.shadowBlur = 10;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);
                            
                            // Gambar landmark (garis wajah)
                            ctx.shadowBlur = 5;
                            ctx.lineWidth = 2;
                            ctx.strokeStyle = '#ffaa00';
                            
                            // Gambar outline wajah (jaw line)
                            const jaw = landmarks.getJawOutline();
                            ctx.beginPath();
                            ctx.moveTo(jaw[0].x, jaw[0].y);
                            for (let i = 1; i < jaw.length; i++) {
                                ctx.lineTo(jaw[i].x, jaw[i].y);
                            }
                            ctx.strokeStyle = '#ffaa00';
                            ctx.stroke();
                            
                            // Gambar alis, mata, hidung, mulut dengan warna berbeda
                            const drawPoints = (points, color) => {
                                ctx.beginPath();
                                ctx.strokeStyle = color;
                                ctx.lineWidth = 2;
                                ctx.moveTo(points[0].x, points[0].y);
                                for (let i = 1; i < points.length; i++) {
                                    ctx.lineTo(points[i].x, points[i].y);
                                }
                                ctx.stroke();
                            };
                            
                            drawPoints(landmarks.getLeftEyeBrow(), '#ff6699');
                            drawPoints(landmarks.getRightEyeBrow(), '#ff6699');
                            drawPoints(landmarks.getLeftEye(), '#66ff99');
                            drawPoints(landmarks.getRightEye(), '#66ff99');
                            drawPoints(landmarks.getNose(), '#66ccff');
                            drawPoints(landmarks.getMouth(), '#ff6666');
                            
                            // Hitung posisi tengah wajah (normalized)
                            const centerX = (box.x + box.width / 2) / canvasDetect.width;
                            const centerY = (box.y + box.height / 2) / canvasDetect.height;
                            
                            // Konversi ke range -1..1 untuk rotasi
                            // Y dibalik karena di canvas sumbu Y ke bawah
                            const normX = (centerX * 2 - 1);
                            const normY = -(centerY * 2 - 1);
                            
                            // Update target rotasi dengan skala
                            targetRotation.y = Math.max(-MAX_ROT_Y, Math.min(MAX_ROT_Y, normX * 1.2));
                            targetRotation.x = Math.max(-MAX_ROT_X, Math.min(MAX_ROT_X, normY * 0.9));
                            
                            if (!faceDetected) {
                                faceDetected = true;
                                statusEl.innerText = '👤 Wajah terdeteksi!';
                                statusEl.classList.remove('error', 'warning');
                            }
                        }
                    } catch (err) {
                        console.warn('Detection error:', err);
                    }
                }
                
                if (!detected) {
                    if (faceDetected) {
                        faceDetected = false;
                        statusEl.innerText = '👀 Wajah hilang, pakai mouse fallback';
                    }
                    // Fallback ke mouse
                    updateTargetFromMouse();
                }
                
                requestAnimationFrame(detectAndDraw);
            }
            
            // --- Mouse fallback ---
            function updateTargetFromMouse() {
                if (mouseX !== 0 || mouseY !== 0) {
                    const normX = (mouseX / window.innerWidth) * 2 - 1;
                    const normY = -(mouseY / window.innerHeight) * 2 + 1;
                    targetRotation.y = Math.max(-MAX_ROT_Y, Math.min(MAX_ROT_Y, normX * 1.0));
                    targetRotation.x = Math.max(-MAX_ROT_X, Math.min(MAX_ROT_X, normY * 0.7));
                }
            }
            
            // Event mouse
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            window.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            });
            
            // --- Animasi Three.js ---
            function animate() {
                requestAnimationFrame(animate);
                
                // Smooth rotasi
                currentRotation.x += (targetRotation.x - currentRotation.x) * smoothFactor;
                currentRotation.y += (targetRotation.y - currentRotation.y) * smoothFactor;
                
                worldGroup.rotation.x = currentRotation.x;
                worldGroup.rotation.y = currentRotation.y;
                
                // Efek tambahan
                cubeGroupFar.rotation.y += 0.0005;
                cubeGroupFar.rotation.x += 0.0003;
                particles.rotation.y += 0.0002;
                
                renderer.render(scene, camera);
            }
            
            // --- Draggable camera window ---
            function makeDraggable(el) {
                let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                const handle = document.getElementById('drag-handle');
                handle.onmousedown = dragMouseDown;
                handle.ontouchstart = dragTouchStart;
                
                function dragMouseDown(e) {
                    e.preventDefault();
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    document.onmouseup = closeDrag;
                    document.onmousemove = elementDrag;
                }
                
                function dragTouchStart(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    pos3 = touch.clientX;
                    pos4 = touch.clientY;
                    document.ontouchend = closeDrag;
                    document.ontouchmove = elementDragTouch;
                }
                
                function elementDrag(e) {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    el.style.top = (el.offsetTop - pos2) + 'px';
                    el.style.left = (el.offsetLeft - pos1) + 'px';
                    el.style.bottom = 'auto';
                    el.style.right = 'auto';
                }
                
                function elementDragTouch(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    pos1 = pos3 - touch.clientX;
                    pos2 = pos4 - touch.clientY;
                    pos3 = touch.clientX;
                    pos4 = touch.clientY;
                    el.style.top = (el.offsetTop - pos2) + 'px';
                    el.style.left = (el.offsetLeft - pos1) + 'px';
                    el.style.bottom = 'auto';
                    el.style.right = 'auto';
                }
                
                function closeDrag() {
                    document.onmouseup = null;
                    document.onmousemove = null;
                    document.ontouchend = null;
                    document.ontouchmove = null;
                }
            }
            
            makeDraggable(document.getElementById('camera-container'));
            
            // --- Inisialisasi utama ---
            async function init() {
                try {
                    await setupCamera();
                    await loadModels();
                    
                    // Mulai loop deteksi
                    detectAndDraw();
                    animate();
                    
                    // Fallback status
                    setTimeout(() => {
                        if (!faceDetected) {
                            statusEl.innerText = '👆 Gerakkan kepala atau mouse untuk parallax';
                        }
                    }, 4000);
                    
                } catch (err) {
                    statusEl.innerText = '❌ Inisialisasi gagal. Gunakan mouse.';
                    statusEl.classList.add('error');
                    modelLoaded = false;
                    detectAndDraw();
                    animate();
                }
            }
            
            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            init();
        })();
    </script>
</body>
</html>
