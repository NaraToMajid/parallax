<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Tracking 3D Parallax | Final</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 20;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #status {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.5);
            padding: 10px 24px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 20;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: opacity 0.3s;
        }
        #status.error {
            background: rgba(255, 50, 50, 0.7);
            color: white;
        }
        #status.warning {
            background: rgba(255, 165, 0, 0.7);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 10;
        }
        canvas {
            display: block;
        }
        /* Animasi fade in untuk konten */
        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Media query untuk mobile */
        @media (max-width: 600px) {
            #info { font-size: 12px; padding: 8px 16px; }
            #status { font-size: 14px; padding: 8px 20px; white-space: normal; width: 80%; }
        }
    </style>
</head>
<body>
    <div id="info">👤 FACE TRACKING · 3D PARALLAX · FINAL</div>
    <div id="status">📡 Menginisialisasi kamera dan deteksi wajah...</div>
    <div id="overlay"></div>

    <!-- Memuat library face-api.js dan Three.js dari CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        (function() {
            // --- Inisialisasi Three.js Scene ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510); // warna biru gelap kosmik
            
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15; // Posisi awal kamera Three
        
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = false; // tidak perlu shadow untuk performa
            document.body.appendChild(renderer.domElement);
            
            // --- Elemen 3D yang akan bergerak dengan parallax ---
            
            // 1. Grup utama yang akan dirotasi berdasarkan posisi wajah
            const worldGroup = new THREE.Group();
            scene.add(worldGroup);
            
            // 2. Kubus-kubus floating (parallax layer 1 - background)
            const cubeGroupFar = new THREE.Group();
            const colors = [0x4facfe, 0x00f2fe, 0xa18cd1, 0xfbc2eb, 0x43e97b, 0x38f9d7];
            for (let i = 0; i < 30; i++) {
                const size = Math.random() * 0.8 + 0.3;
                const geometry = new THREE.BoxGeometry(size, size, size);
                const material = new THREE.MeshStandardMaterial({ 
                    color: colors[Math.floor(Math.random() * colors.length)],
                    emissive: 0x222222,
                    roughness: 0.3,
                    metalness: 0.1,
                    transparent: true,
                    opacity: 0.7
                });
                const cube = new THREE.Mesh(geometry, material);
                
                // Posisi acak dalam radius 12
                const radius = 12;
                cube.position.x = (Math.random() - 0.5) * radius * 2;
                cube.position.y = (Math.random() - 0.5) * radius * 1.5;
                cube.position.z = (Math.random() - 0.5) * radius * 0.8 - 5; // lebih ke belakang
                
                // Rotasi acak
                cube.rotation.x = Math.random() * Math.PI;
                cube.rotation.y = Math.random() * Math.PI;
                
                cubeGroupFar.add(cube);
            }
            worldGroup.add(cubeGroupFar);
            
            // 3. Objek utama: Ikon Wajah 3D (sebagai pusat) - layer tengah
            const faceGroup = new THREE.Group();
            
            // Lingkaran cahaya di sekitar wajah
            const ringGeo = new THREE.TorusGeometry(2.2, 0.08, 16, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x004444 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.rotation.z = Math.PI / 4;
            faceGroup.add(ring);
            
            // Lingkaran kedua lebih kecil
            const ring2Geo = new THREE.TorusGeometry(1.8, 0.05, 16, 100);
            const ring2Mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
            const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
            ring2.rotation.x = Math.PI / 2;
            ring2.rotation.z = -Math.PI / 6;
            faceGroup.add(ring2);
            
            // Bentuk dasar wajah (sphere)
            const headGeo = new THREE.SphereGeometry(1.5, 32, 32);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x221100, roughness: 0.4 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.2;
            faceGroup.add(head);
            
            // Mata
            const eyeGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 });
            const pupilGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.7, 0.7, 1.2);
            faceGroup.add(eyeL);
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.7, 0.7, 1.5);
            faceGroup.add(pupilL);
            
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.7, 0.7, 1.2);
            faceGroup.add(eyeR);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.7, 0.7, 1.5);
            faceGroup.add(pupilR);
            
            // Hidung
            const noseGeo = new THREE.ConeGeometry(0.3, 0.8, 8);
            const noseMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.set(0, -0.2, 1.6);
            nose.rotation.x = 0.2;
            faceGroup.add(nose);
            
            // Mulut (torus kecil)
            const mouthGeo = new THREE.TorusGeometry(0.5, 0.1, 8, 32, Math.PI);
            const mouthMat = new THREE.MeshStandardMaterial({ color: 0xff6699 });
            const mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.7, 1.4);
            mouth.rotation.x = 0.1;
            mouth.rotation.z = 0.1;
            mouth.scale.set(0.8, 0.5, 0.5);
            faceGroup.add(mouth);
            
            worldGroup.add(faceGroup);
            
            // 4. Partikel kecil (layer depan untuk efek kedalaman)
            const particleCount = 600;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            const particleColors = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                // Posisi dalam sphere radius 20, tapi lebih banyak di depan
                const r = 10 + Math.random() * 15;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                
                particlePositions[i*3] = x;
                particlePositions[i*3+1] = y;
                particlePositions[i*3+2] = z - 5; // geser sedikit ke belakang
                
                const color = new THREE.Color().setHSL(Math.random() * 0.3 + 0.5, 0.8, 0.6);
                particleColors[i*3] = color.r;
                particleColors[i*3+1] = color.g;
                particleColors[i*3+2] = color.b;
            }
            
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
            
            const particleMat = new THREE.PointsMaterial({ 
                size: 0.15, 
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            const particles = new THREE.Points(particleGeo, particleMat);
            worldGroup.add(particles);
            
            // 5. Lampu-lampu
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            // Lampu utama dari depan
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(1, 1, 5);
            scene.add(mainLight);
            
            // Lampu warna dari samping
            const light1 = new THREE.PointLight(0x4466ff, 1, 20);
            light1.position.set(5, 2, 5);
            scene.add(light1);
            
            const light2 = new THREE.PointLight(0xff6644, 1, 20);
            light2.position.set(-5, -1, 5);
            scene.add(light2);
            
            const light3 = new THREE.PointLight(0x44ff88, 0.5, 30);
            light3.position.set(0, 5, 10);
            scene.add(light3);
            
            // --- Variabel Face Tracking ---
            let videoElement;
            let currentFace = null; // { x, y, width, angle? }
            let faceDetected = false;
            let detectionActive = true;
            let modelLoaded = false;
            
            // Target rotasi untuk worldGroup (berdasarkan posisi wajah)
            const targetRotation = { x: 0, y: 0 };
            const currentRotation = { x: 0, y: 0 };
            
            // Untuk smoothing pergerakan
            const smoothFactor = 0.1;
            
            // Ambil elemen status
            const statusEl = document.getElementById('status');
            
            // --- Setup Video ---
            async function setupCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: 'user',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        } 
                    });
                    
                    videoElement = document.createElement('video');
                    videoElement.srcObject = stream;
                    videoElement.setAttribute('playsinline', '');
                    videoElement.setAttribute('autoplay', '');
                    videoElement.setAttribute('muted', '');
                    videoElement.style.position = 'absolute';
                    videoElement.style.top = '0';
                    videoElement.style.left = '0';
                    videoElement.style.width = '1px'; // Sembunyikan tapi tetap berjalan
                    videoElement.style.height = '1px';
                    videoElement.style.opacity = '0';
                    videoElement.style.pointerEvents = 'none';
                    document.body.appendChild(videoElement);
                    
                    return new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            videoElement.play();
                            resolve(videoElement);
                        };
                    });
                } catch (err) {
                    statusEl.innerText = '❌ Tidak dapat mengakses kamera.';
                    statusEl.classList.add('error');
                    console.error(err);
                    throw err;
                }
            }
            
            // --- Load FaceAPI models ---
            async function loadModels() {
                statusEl.innerText = '⏳ Memuat model deteksi wajah...';
                // Menggunakan CDN face-api.js model
                const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                try {
                    await faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
                    // Tidak perlu load recognition untuk efisiensi
                    modelLoaded = true;
                    statusEl.innerText = '✅ Model siap. Mendeteksi wajah...';
                } catch (err) {
                    statusEl.innerText = '⚠️ Gagal muat model. Gunakan mode fallback.';
                    statusEl.classList.add('warning');
                    console.warn('Model load error:', err);
                    // Tetap set true agar deteksi tetap jalan (mungkin gagal, tapi akan pakai fallback)
                    modelLoaded = true; // tetap coba deteksi
                }
            }
            
            // --- Fungsi deteksi wajah (loop) ---
            async function detectFace() {
                if (!detectionActive || !videoElement || videoElement.readyState < 2) {
                    requestAnimationFrame(detectFace);
                    return;
                }
                
                if (modelLoaded) {
                    try {
                        // Deteksi dengan TinyFaceDetector (cepat)
                        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
                        const detections = await faceapi.detectSingleFace(videoElement, options);
                        
                        if (detections) {
                            const box = detections.box;
                            // Normalisasi koordinat: relative terhadap video size
                            const videoWidth = videoElement.videoWidth;
                            const videoHeight = videoElement.videoHeight;
                            
                            // Posisi tengah wajah (x dan y dalam range -1..1)
                            const faceX = ((box.x + box.width / 2) / videoWidth) * 2 - 1;
                            const faceY = -(((box.y + box.height / 2) / videoHeight) * 2 - 1); // dibalik karena sumbu Y kamera terbalik
                            
                            // Lebar wajah relatif terhadap lebar video, digunakan untuk perkiraan jarak (z)
                            const faceWidthRel = box.width / videoWidth;
                            
                            // Update target rotasi: x (pitch) berdasarkan posisi Y, y (yaw) berdasarkan posisi X
                            // Batasi rotasi maksimal 0.5 rad (~28 derajat)
                            targetRotation.y = Math.max(-0.5, Math.min(0.5, faceX * 0.8));
                            targetRotation.x = Math.max(-0.3, Math.min(0.3, faceY * 0.5));
                            
                            // Opsional: gunakan lebar wajah untuk menggeser sedikit Z (parallax skala)
                            // Tapi kita tidak lakukan di sini agar stabil
                            
                            if (!faceDetected) {
                                faceDetected = true;
                                statusEl.innerText = '👤 Wajah terdeteksi! Gerakkan kepala.';
                                statusEl.classList.remove('error', 'warning');
                            }
                        } else {
                            if (faceDetected) {
                                faceDetected = false;
                                statusEl.innerText = '👀 Wajah hilang, gunakan gerakan mouse fallback.';
                            } else if (!faceDetected) {
                                statusEl.innerText = '🔍 Cari wajah... (gerakkan mouse sebagai fallback)';
                            }
                            // Fallback ke mouse jika tidak ada deteksi
                            updateTargetFromMouseFallback();
                        }
                    } catch (err) {
                        console.warn('Detection error:', err);
                        updateTargetFromMouseFallback();
                    }
                } else {
                    // Model belum siap, fallback mouse
                    updateTargetFromMouseFallback();
                }
                
                requestAnimationFrame(detectFace);
            }
            
            // --- Mouse fallback ---
            function updateTargetFromMouseFallback() {
                // Gunakan posisi mouse jika tidak ada wajah
                const mouseX = (window.mouseX || 0) / window.innerWidth * 2 - 1;
                const mouseY = -(window.mouseY || 0) / window.innerHeight * 2 + 1;
                
                targetRotation.y = Math.max(-0.5, Math.min(0.5, mouseX * 0.8));
                targetRotation.x = Math.max(-0.3, Math.min(0.3, mouseY * 0.5));
            }
            
            // Menyimpan posisi mouse
            window.addEventListener('mousemove', (e) => {
                window.mouseX = e.clientX;
                window.mouseY = e.clientY;
            });
            
            // Untuk touch device
            window.addEventListener('touchmove', (e) => {
                if (e.touches.length) {
                    window.mouseX = e.touches[0].clientX;
                    window.mouseY = e.touches[0].clientY;
                }
            });
            
            // --- Animasi loop untuk Three.js ---
            function animate() {
                requestAnimationFrame(animate);
                
                // Smooth rotasi
                currentRotation.x += (targetRotation.x - currentRotation.x) * smoothFactor;
                currentRotation.y += (targetRotation.y - currentRotation.y) * smoothFactor;
                
                // Terapkan rotasi ke worldGroup
                worldGroup.rotation.x = currentRotation.x;
                worldGroup.rotation.y = currentRotation.y;
                
                // Efek tambahan: putar cubeGroupFar sedikit berlawanan untuk parallax lebih dalam
                cubeGroupFar.rotation.y += 0.0005;
                cubeGroupFar.rotation.x += 0.0003;
                
                // Putar partikel secara lambat
                particles.rotation.y += 0.0002;
                
                // Render scene
                renderer.render(scene, camera);
            }
            
            // --- Inisialisasi utama ---
            async function init() {
                try {
                    await setupCamera();
                    await loadModels();
                    
                    // Mulai deteksi setelah semuanya siap
                    setTimeout(() => {
                        detectFace();
                    }, 1000);
                    
                    animate();
                    
                    // Update status setelah beberapa saat
                    setTimeout(() => {
                        if (!faceDetected) {
                            statusEl.innerText = '👆 Gerakkan mouse atau wajah untuk parallax';
                        }
                    }, 5000);
                    
                } catch (err) {
                    statusEl.innerText = '❌ Inisialisasi gagal. Gunakan mouse.';
                    statusEl.classList.add('error');
                    // Tetap jalankan fallback mouse
                    modelLoaded = false; // supaya fallback terus
                    detectFace();
                    animate();
                }
            }
            
            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            // Mulai
            init();
        })();
    </script>
</body>
</html>
